name: Railway Auto Schedule

on:
  schedule:
    - cron: "0 12 * * *" # 7 AM EST → Resume
    - cron: "0 4 * * *" # 11 PM EST → Suspend
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "resume"
        type: choice
        options:
          - resume
          - suspend

jobs:
  manage-railway:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "12" ]; then
              echo "action=resume" >> $GITHUB_OUTPUT
            else
              echo "action=suspend" >> $GITHUB_OUTPUT
            fi
          else
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          fi

      - name: Resume Railway services
        if: steps.action.outputs.action == 'resume'
        run: |
          for SERVICE_ID in "${{ secrets.RAILWAY_SERVICE_ID_MYSQL }}" "${{ secrets.RAILWAY_SERVICE_ID_BACKEND }}" "${{ secrets.RAILWAY_SERVICE_ID_FRONTEND }}" "${{ secrets.RAILWAY_SERVICE_ID_ACHIEVEMENT }}"; do
            echo "Resuming $SERVICE_ID..."
            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", input: { numReplicas: 1 }) }\"}")
            echo "Response: $RESPONSE"
          done

      - name: Suspend Railway services
        if: steps.action.outputs.action == 'suspend'
        run: |
          for SERVICE_ID in "${{ secrets.RAILWAY_SERVICE_ID_FRONTEND }}" "${{ secrets.RAILWAY_SERVICE_ID_ACHIEVEMENT }}" "${{ secrets.RAILWAY_SERVICE_ID_BACKEND }}" "${{ secrets.RAILWAY_SERVICE_ID_MYSQL }}"; do
            echo "Suspending $SERVICE_ID..."
            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", input: { numReplicas: 0 }) }\"}")
            echo "Response: $RESPONSE"
          done
